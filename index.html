<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Виртуальный Тур</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .portal-btn {
            position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff;
            background: rgba(255, 255, 255, 0.3); cursor: pointer; transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.6); transition: all 0.2s ease; z-index: 10;
        }
        .portal-btn:hover { background: #fff; transform: translate(-50%, -50%) scale(1.15); }
        .portal-btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: solid #fff; border-width: 0 4px 4px 0; padding: 4px; display: inline-block;
        }
        .next-btn::after { transform: translate(-70%, -50%) rotate(-45deg); }
        .prev-btn::after { transform: translate(-30%, -50%) rotate(135deg); }
        #room-title { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 16px; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="viewer"></div>
    <div id="room-title">Загрузка тура...</div>
    
    <!-- Две автоматические кнопки: Назад и Вперед -->
    <div id="portal-prev" class="portal-btn prev-btn" title="Назад"></div>
    <div id="portal-next" class="portal-btn next-btn" title="Вперед"></div>

    <script>
        const viewer = document.getElementById('viewer'), canvas = document.createElement('canvas');
        const pPrev = document.getElementById('portal-prev'), pNext = document.getElementById('portal-next');
        const rTitle = document.getElementById('room-title');
        viewer.appendChild(canvas);
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        // Автоматическая генерация карты тура из адресной строки
        let playlist = ['panoramatur1.png', 'panoramatur2.png']; // Базовый тур, если ссылка пустая
        const urlParams = new URLSearchParams(window.location.search);
        const pParam = urlParams.get('p');
        if (pParam) playlist = pParam.split(',');

        let currentIndex = 0;
        let lon = 0, lat = 0, startX, startY, startLon, startLat, isMousedown = false;
        let img = new Image(), tex, rotLoc, aspLoc;

        // Координаты порталов: "Вперед" стоит по центру (0), "Назад" за спиной (3.14)
        const portalsConfig = {
            next: { lon: 0.0, lat: -0.2 },
            prev: { lon: 3.14, lat: -0.2 }
        };

        const vs = `attribute vec3 p; varying vec3 v; void main() { v = p; gl_Position = vec4(p.x, p.y, 1.0, 1.0); }`;
        const fs = `precision mediump float; uniform sampler2D t; uniform vec2 aspect; uniform vec2 rot; varying vec3 v;
            void main() {
                vec3 d = vec3(v.x * aspect.x, v.y * aspect.y, 1.0); d = normalize(d); d.x = -d.x;
                float sinX = sin(rot.y), cosX = cos(rot.y), sinY = sin(rot.x), cosY = cos(rot.x);
                vec3 r = vec3(d.x * cosY + (d.y * sinX - d.z * cosX) * sinY, d.y * cosX + d.z * sinX, -d.x * sinY + (d.y * sinX - d.z * cosX) * cosY);
                r = normalize(r);
                gl_FragColor = texture2D(t, vec2((atan(r.x, r.z) + 3.14159) / 6.28318, (1.57079 - asin(r.y)) / 3.14159));
            }`;

        function loadScene(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const filename = playlist[currentIndex];
            
            // Красивое имя комнаты из названия файла (просто убираем расширение)
            rTitle.innerText = filename.split('.')[0].toUpperCase();
            
            img.onload = () => {
                if (!tex) initGL();
                gl.bindTexture(gl.TEXTURE_2D, tex);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
                updatePortals();
            };
            img.src = filename;
        }

        function initGL() {
            resize(); window.addEventListener('resize', () => resize());
            const vS = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vS, vs); gl.compileShader(vS);
            const fS = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fS, fs); gl.compileShader(fS);
            const prog = gl.createProgram(); gl.attachShader(prog, vS); gl.attachShader(prog, fS); gl.linkProgram(prog); gl.useProgram(prog);
            const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,0, -1,1,0, 1,-1,0, 1,-1,0, -1,1,0, 1,1,0]), gl.STATIC_DRAW);
            const pLoc = gl.getAttribLocation(prog, "p"); gl.enableVertexAttribArray(pLoc); gl.vertexAttribPointer(pLoc, 3, gl.FLOAT, false, 0, 0);
            tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            rotLoc = gl.getUniformLocation(prog, "rot"); aspLoc = gl.getUniformLocation(prog, "aspect");
            render();
        }

        function resize() {
            canvas.width = viewer.clientWidth; canvas.height = viewer.clientHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function positionPortal(element, config) {
            let diffLon = config.lon - lon;
            while (diffLon > Math.PI) diffLon -= Math.PI * 2;
            while (diffLon < -Math.PI) diffLon += Math.PI * 2;
            
            if (Math.cos(diffLon) > 0) {
                const screenX = canvas.width / 2 - Math.sin(diffLon) * (canvas.width / 2);
                const screenY = canvas.height / 2 + Math.sin(config.lat - lat) * (canvas.height / 2);
                element.style.left = screenX + 'px'; element.style.top = screenY + 'px';
                element.style.display = 'block';
            } else {
                element.style.display = 'none';
            }
        }

        function updatePortals() {
            // Показываем кнопку "Вперед", только если есть следующая комната
            if (currentIndex < playlist.length - 1) {
                positionPortal(pNext, portalsConfig.next);
            } else {
                pNext.style.display = 'none';
            }

            // Показываем кнопку "Назад", только если есть предыдущая комната
            if (currentIndex > 0) {
                positionPortal(pPrev, portalsConfig.prev);
            } else {
                pPrev.style.display = 'none';
            }
        }

        viewer.addEventListener('pointerdown', (e) => {
            isMousedown = true; startX = e.clientX; startY = e.clientY; startLon = lon; startLat = lat;
        });
        window.addEventListener('pointermove', (e) => {
            if (!isMousedown) return;
            lon = startLon - (e.clientX - startX) * 0.003;
            lat = startLat - (e.clientY - startY) * 0.003;
            lat = Math.max(-1.4, Math.min(1.4, lat));
            updatePortals();
        });
        window.addEventListener('pointerup', () => isMousedown = false);

        pNext.addEventListener('click', () => loadScene(currentIndex + 1));
        pPrev.addEventListener('click', () => loadScene(currentIndex - 1));

        function render() {
            requestAnimationFrame(render);
            gl.uniform2f(aspLoc, canvas.width / canvas.height, 1.0);
            gl.uniform2f(rotLoc, lon, lat);
            gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        loadScene(0);
    </script>
</body>
</html>
